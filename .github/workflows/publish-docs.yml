name: Publish docs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: libmodbuzz
  DOCS_URL: https://shishir-dey.github.io/libmodbuzz/
  DOCS_TITLE: libmodbuzz - Rust Modbus Library Documentation
  DOCS_DESCRIPTION: Documentation for libmodbuzz, a safe, idiomatic Rust implementation of the Modbus protocol supporting RTU and TCP transports.

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      - name: Prepare docs for deployment
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R target/doc/. docs/
          touch docs/.nojekyll

          cat > docs/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${DOCS_TITLE}</title>
              <meta name="description" content="${DOCS_DESCRIPTION}">
              <meta name="keywords" content="rust, modbus, rtu, tcp, industrial, protocol, embedded, documentation">
              <meta name="author" content="Shishir Dey">
              <link rel="canonical" href="${DOCS_URL}">

              <meta property="og:type" content="website">
              <meta property="og:url" content="${DOCS_URL}">
              <meta property="og:title" content="${DOCS_TITLE}">
              <meta property="og:description" content="${DOCS_DESCRIPTION}">

              <meta property="twitter:card" content="summary">
              <meta property="twitter:url" content="${DOCS_URL}">
              <meta property="twitter:title" content="${DOCS_TITLE}">
              <meta property="twitter:description" content="${DOCS_DESCRIPTION}">

              <script type="application/ld+json">
              {
                "@context": "https://schema.org",
                "@type": "SoftwareApplication",
                "name": "libmodbuzz",
                "description": "A safe, idiomatic Rust implementation of the Modbus protocol supporting RTU and TCP transports",
                "url": "https://shishir-dey.github.io/libmodbuzz/",
                "applicationCategory": "DeveloperApplication",
                "operatingSystem": "Cross-platform",
                "programmingLanguage": "Rust",
                "author": {
                  "@type": "Person",
                  "name": "Shishir Dey"
                }
              }
              </script>

              <style>
                  :root {
                      color-scheme: light;
                      --bg: #eef3f8;
                      --panel: #ffffff;
                      --text: #112133;
                      --muted: #506174;
                      --accent: #0d6efd;
                      --accent-strong: #0a58ca;
                      --border: #d6e0eb;
                  }

                  * {
                      box-sizing: border-box;
                  }

                  body {
                      margin: 0;
                      min-height: 100vh;
                      display: grid;
                      place-items: center;
                      padding: 24px;
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 58%);
                      color: var(--text);
                  }

                  main {
                      width: min(760px, 100%);
                      background: var(--panel);
                      border: 1px solid var(--border);
                      border-radius: 18px;
                      padding: 40px;
                      box-shadow: 0 18px 40px rgba(17, 33, 51, 0.08);
                  }

                  h1 {
                      margin: 0 0 12px;
                      font-size: clamp(2rem, 5vw, 2.75rem);
                  }

                  p {
                      margin: 0;
                      line-height: 1.7;
                  }

                  .lede {
                      color: var(--muted);
                      margin-bottom: 28px;
                  }

                  .panel {
                      margin: 28px 0;
                      padding: 20px 22px;
                      background: #f7faff;
                      border-left: 4px solid var(--accent);
                      border-radius: 10px;
                  }

                  .meta {
                      margin-top: 24px;
                      color: var(--muted);
                      font-size: 0.95rem;
                  }

                  .actions {
                      margin-top: 28px;
                      display: flex;
                      flex-wrap: wrap;
                      gap: 14px;
                  }

                  .button {
                      display: inline-flex;
                      align-items: center;
                      justify-content: center;
                      padding: 12px 20px;
                      border-radius: 999px;
                      text-decoration: none;
                      font-weight: 600;
                      color: #fff;
                      background: var(--accent);
                  }

                  .button:hover {
                      background: var(--accent-strong);
                  }

                  .button.secondary {
                      color: var(--text);
                      background: transparent;
                      border: 1px solid var(--border);
                  }

                  .button.secondary:hover {
                      background: #f5f8fb;
                  }
              </style>
          </head>
          <body>
              <main>
                  <h1>libmodbuzz documentation</h1>
                  <p class="lede">
                      Generated API documentation for libmodbuzz, a safe and idiomatic Rust Modbus library for RTU and TCP transports.
                  </p>

                  <div class="panel">
                      <p><strong>You will be redirected to the API reference in 3 seconds.</strong></p>
                      <p>If the redirect does not happen, use the button below.</p>
                  </div>

                  <div class="actions">
                      <a class="button" href="./${CRATE_NAME}/index.html" id="manual-link">Open API docs</a>
                      <a class="button secondary" href="https://github.com/shishir-dey/libmodbuzz">View source on GitHub</a>
                  </div>

                  <p class="meta">
                      This site is published from the crate sources with <code>cargo doc --no-deps</code>.
                  </p>

                  <noscript>
                      <div class="panel">
                          <p><strong>JavaScript is disabled.</strong></p>
                          <p>Please use the "Open API docs" button above.</p>
                      </div>
                  </noscript>
              </main>

              <script>
                  setTimeout(function() {
                      window.location.href = "./${CRATE_NAME}/index.html";
                  }, 3000);

                  document.getElementById("manual-link").addEventListener("click", function(event) {
                      event.preventDefault();
                      window.location.href = "./${CRATE_NAME}/index.html";
                  });
              </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
